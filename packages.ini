key_path=/usr/share/keyrings/wezterm-fury.gpg
repo_line=deb [signed-by=/usr/share/keyrings/wezterm-fury.gpg] https://apt.fury.io/wez/ * *
list_path=/etc/apt/sources.list.d/wezterm.list

